<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Get the repository name from the current path
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const basePath = '/Financial-Overview/';
      
      // Preserve the path after the base
      const currentPath = window.location.pathname;
      const baseIndex = currentPath.indexOf(basePath);
      
      if (baseIndex !== -1) {
        const pathAfterBase = currentPath.substring(baseIndex + basePath.length);
        if (pathAfterBase && pathAfterBase !== '') {
          // Redirect to app with the path preserved
          window.location.replace(basePath + '?redirect=/' + pathAfterBase);
        } else {
          // Already at base, go to index
          window.location.replace(basePath);
        }
      } else {
        // Fallback redirect
        window.location.replace(basePath);
      }
    </script>
  </head>
  <body>
    <p>Redirecting to app...</p>
  </body>
</html>
